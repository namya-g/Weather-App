<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <header>
        <h2>🌤️Weather App</h2>
        <input type="text" id="city_name" placeholder="Enter city name">
        <button type="submit" id="search" title="Search">🔍</button>
    </header>
    <main>
        <h1>City Name</h1>
        <div>
            <p>Now</p>
            <span>temp-emoji</span>
            <span>temp</span>
            <p>Feels like</p>
            <div>
                <span>🌞</span>
                <div>
                    UV Index
                    <br>
                    uv-index
                </div>
            </div>
            <div>
                <span>wind-emoji</span>
                <div>
                    Wind
                    <br>
                    wind-speed
                </div>
            </div>
            <div>
                <span>💧</span>
                <div>
                    Precipitation
                    <br>
                    precipitation-chance
                </div>
            </div>
            <div>
                <span>☁️</span>
                <div>
                    Visibility
                    <br>
                    visibility-value
                </div>
            </div>
        </div>
        <div>
            
        </div>
    </main>
</body>
</html>
